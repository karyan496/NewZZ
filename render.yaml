services:
  # ── Cron job: runs the full pipeline daily at 8 AM UTC ──────────────────
  - type: cron
    name: ai-news-daily-pipeline
    runtime: docker
    schedule: "0 8 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: uv run python main.py
    disk:
      name: faiss-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-db
          property: connectionString
      - key: FAISS_DIR
        value: /data
      - key: GITHUB_TOKEN
        sync: false        # you'll paste this in the Render dashboard
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false

databases:
  # ── Managed PostgreSQL ───────────────────────────────────────────────────
  - name: ai-news-db
    databaseName: ai_news_aggregator
    user: postgres
    plan: free